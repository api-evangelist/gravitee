naftiko: 1.0.0-alpha2
info:
  label: Federate Gravitee Access Management with Keycloak as upstream IdP
  description: Configure Gravitee AM domains to delegate authentication to a Keycloak realm, syncing user provisioning so apps behind the Gravitee gateway inherit Keycloak SSO.
  tags:
  - Gravitee
  - Integration
  - Identity
  - keycloak
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    KEYCLOAK_API_KEY: KEYCLOAK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-organizations-organizationid-environments-environ
      path: /management/organizations/{organizationId}/environments/{environmentId}/domains
      operations:
      - name: listamdomains
        method: GET
        description: List Gravitee AM domains to attach a Keycloak identity provider to each.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: Path parameter organizationId.
          required: true
        - name: environmentId
          in: path
          type: string
          description: Path parameter environmentId.
          required: true
    - name: management-organizations-organizationid-environments-environ
      path: /management/organizations/{organizationId}/environments/{environmentId}/domains/{domain}/applications
      operations:
      - name: listamapplications
        method: GET
        description: List apps in a Gravitee AM domain to bind to Keycloak-issued tokens.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: Path parameter organizationId.
          required: true
        - name: environmentId
          in: path
          type: string
          description: Path parameter environmentId.
          required: true
        - name: domain
          in: path
          type: string
          description: Path parameter domain.
          required: true
  - type: http
    namespace: keycloak
    baseUri: https://keycloak.example.com
    description: Keycloak Admin REST API operations consumed by this integration.
    resources:
    - name: admin-realms-realm-users
      path: /admin/realms/{realm}/users
      operations:
      - name: listusers
        method: GET
        description: 'Keycloak Admin REST API: listUsers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realm
          in: path
          type: string
          description: Path parameter realm.
          required: true
    - name: admin-realms-realm-users
      path: /admin/realms/{realm}/users
      operations:
      - name: createuser
        method: POST
        description: 'Keycloak Admin REST API: createUser'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: realm
          in: path
          type: string
          description: Path parameter realm.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-keycloak-mcp
    description: MCP adapter for the gravitee-keycloak integration.
    tools:
    - name: gravitee_keycloak
      description: Execute the gravitee keycloak integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-keycloak-rest
    port: 8080
    description: REST adapter for the gravitee-keycloak integration.
    resources:
    - path: /gravitee-keycloak
      name: gravitee-keycloak
      description: REST surface for the gravitee-keycloak integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-keycloak integration.
        call: gravitee_keycloak
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
