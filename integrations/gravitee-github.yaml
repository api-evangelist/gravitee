naftiko: 1.0.0-alpha2
info:
  label: Sync Gravitee API definitions to a GitHub spec repo
  description: On every Gravitee API publish, commit the OpenAPI / API definition back to a GitHub repo so spec history lives in version control alongside the platform team's workflows.
  tags:
  - Gravitee
  - Integration
  - Governance
  - github
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    GITHUB_API_KEY: GITHUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-apis-apiid
      path: /management/v2/environments/{envId}/apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: Fetch the Gravitee API definition to commit to GitHub.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
    - name: management-v2-environments-envid-apis-import-swagger
      path: /management/v2/environments/{envId}/apis/_import/swagger
      operations:
      - name: importswaggerapi
        method: POST
        description: Re-import an updated Swagger / OpenAPI document from GitHub back into Gravitee.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: github
    baseUri: https://api.github.com
    description: GitHub REST API operations consumed by this integration.
    resources:
    - name: repos-owner-repo-contents-path
      path: /repos/{owner}/{repo}/contents/{path}
      operations:
      - name: putfilecontents
        method: PUT
        description: 'GitHub REST API: putFileContents'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: Path parameter owner.
          required: true
        - name: repo
          in: path
          type: string
          description: Path parameter repo.
          required: true
        - name: path
          in: path
          type: string
          description: Path parameter path.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repos-owner-repo-contents-path
      path: /repos/{owner}/{repo}/contents/{path}
      operations:
      - name: getfilecontents
        method: GET
        description: 'GitHub REST API: getFileContents'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: owner
          in: path
          type: string
          description: Path parameter owner.
          required: true
        - name: repo
          in: path
          type: string
          description: Path parameter repo.
          required: true
        - name: path
          in: path
          type: string
          description: Path parameter path.
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-github-mcp
    description: MCP adapter for the gravitee-github integration.
    tools:
    - name: gravitee_github
      description: Execute the gravitee github integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-github-rest
    port: 8080
    description: REST adapter for the gravitee-github integration.
    resources:
    - path: /gravitee-github
      name: gravitee-github
      description: REST surface for the gravitee-github integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-github integration.
        call: gravitee_github
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
