naftiko: 1.0.0-alpha2
info:
  label: Post Gravitee gateway alerts to Slack channels
  description: Forward Gravitee API lifecycle events (deploys, plan publishes, subscription approvals, error spikes) to designated Slack channels via Incoming Webhook for platform team visibility.
  tags:
  - Gravitee
  - Integration
  - Notifications
  - slack
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-subscriptions
      path: /management/v2/environments/{envId}/subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: List recent Gravitee subscriptions to surface in Slack alerts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
    - name: management-v2-environments-envid-logs-search
      path: /management/v2/environments/{envId}/logs/search
      operations:
      - name: searchlogs
        method: POST
        description: Query Gravitee gateway error logs to drive Slack alert payloads.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-logs-error-keys
      path: /management/v2/environments/{envId}/logs/error-keys
      operations:
      - name: listerrorkeys
        method: GET
        description: Enumerate Gravitee error keys so Slack alerts can group by root cause.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
  - type: http
    namespace: slack
    baseUri: https://hooks.slack.com
    description: Slack Incoming Webhooks operations consumed by this integration.
    resources:
    - name: services-t-b-x
      path: /services/{T}/{B}/{X}
      operations:
      - name: postmessage
        method: POST
        description: 'Slack Incoming Webhooks: postMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: T
          in: path
          type: string
          description: Path parameter T.
          required: true
        - name: B
          in: path
          type: string
          description: Path parameter B.
          required: true
        - name: X
          in: path
          type: string
          description: Path parameter X.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-slack-mcp
    description: MCP adapter for the gravitee-slack integration.
    tools:
    - name: gravitee_slack
      description: Execute the gravitee slack integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-slack-rest
    port: 8080
    description: REST adapter for the gravitee-slack integration.
    resources:
    - path: /gravitee-slack
      name: gravitee-slack
      description: REST surface for the gravitee-slack integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-slack integration.
        call: gravitee_slack
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
