naftiko: 1.0.0-alpha2
info:
  label: Connect Gravitee gateway to HiveMQ MQTT broker
  description: Wire Gravitee APIM v4 MQTT endpoint to a HiveMQ broker so IoT clients can publish / subscribe through the gateway with policies enforced.
  tags:
  - Gravitee
  - Integration
  - Event Streaming
  - mqtt-broker
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    MQTT_BROKER_API_KEY: MQTT_BROKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-apis-apiid
      path: /management/v2/environments/{envId}/apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: Read the Gravitee v4 API definition to wire its MQTT entrypoint to HiveMQ.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
    - name: management-v2-environments-envid-apis-apiid-deploy
      path: /management/v2/environments/{envId}/apis/{apiId}/_deploy
      operations:
      - name: deployapi
        method: POST
        description: Redeploy the Gravitee API after attaching the HiveMQ MQTT backend.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: mqtt-broker
    baseUri: https://api.hivemq.cloud
    description: HiveMQ Cloud REST API operations consumed by this integration.
    resources:
    - name: api-v1-management-clients
      path: /api/v1/management/clients
      operations:
      - name: createclient
        method: POST
        description: 'HiveMQ Cloud REST API: createClient'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-management-clients
      path: /api/v1/management/clients
      operations:
      - name: listclients
        method: GET
        description: 'HiveMQ Cloud REST API: listClients'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  exposes:
  - type: mcp
    namespace: gravitee-mqtt-broker-mcp
    description: MCP adapter for the gravitee-mqtt-broker integration.
    tools:
    - name: gravitee_mqtt_broker
      description: Execute the gravitee mqtt broker integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-mqtt-broker-rest
    port: 8080
    description: REST adapter for the gravitee-mqtt-broker integration.
    resources:
    - path: /gravitee-mqtt-broker
      name: gravitee-mqtt-broker
      description: REST surface for the gravitee-mqtt-broker integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-mqtt-broker integration.
        call: gravitee_mqtt_broker
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
