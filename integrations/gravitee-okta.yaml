naftiko: 1.0.0-alpha2
info:
  label: Provision Gravitee AM users from Okta workforce identities
  description: When an Okta user is added to a Gravitee-bound group, mint or update the matching Gravitee Access Management user so workforce SSO flows into the dev portal.
  tags:
  - Gravitee
  - Integration
  - Identity
  - okta
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    OKTA_API_KEY: OKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-organizations-organizationid-environments-environ
      path: /management/organizations/{organizationId}/environments/{environmentId}/domains/{domain}/applications
      operations:
      - name: listamapplications
        method: GET
        description: List Gravitee AM applications to map Okta groups onto.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: Path parameter organizationId.
          required: true
        - name: environmentId
          in: path
          type: string
          description: Path parameter environmentId.
          required: true
        - name: domain
          in: path
          type: string
          description: Path parameter domain.
          required: true
    - name: management-organizations-organizationid-environments-environ
      path: /management/organizations/{organizationId}/environments/{environmentId}/domains
      operations:
      - name: listamdomains
        method: GET
        description: List Gravitee AM domains so Okta group provisioning can target the right tenant.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: Path parameter organizationId.
          required: true
        - name: environmentId
          in: path
          type: string
          description: Path parameter environmentId.
          required: true
  - type: http
    namespace: okta
    baseUri: https://yourdomain.okta.com
    description: Okta API operations consumed by this integration.
    resources:
    - name: api-v1-users
      path: /api/v1/users
      operations:
      - name: listusers
        method: GET
        description: 'Okta API: listUsers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: api-v1-groups-groupid-users
      path: /api/v1/groups/{groupId}/users
      operations:
      - name: listgroupusers
        method: GET
        description: 'Okta API: listGroupUsers'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: Path parameter groupId.
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-okta-mcp
    description: MCP adapter for the gravitee-okta integration.
    tools:
    - name: gravitee_okta
      description: Execute the gravitee okta integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-okta-rest
    port: 8080
    description: REST adapter for the gravitee-okta integration.
    resources:
    - path: /gravitee-okta
      name: gravitee-okta
      description: REST surface for the gravitee-okta integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-okta integration.
        call: gravitee_okta
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
