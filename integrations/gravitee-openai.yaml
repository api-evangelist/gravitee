naftiko: 1.0.0-alpha2
info:
  label: Front OpenAI with Gravitee AI Gateway for policy and metering
  description: Route OpenAI API calls through the Gravitee AI Gateway so chat completions are subject to rate-limit, key-management, prompt-policy, and per-team cost attribution policies.
  tags:
  - Gravitee
  - Integration
  - AI Gateway
  - openai
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-apis-import-swagger
      path: /management/v2/environments/{envId}/apis/_import/swagger
      operations:
      - name: importswaggerapi
        method: POST
        description: Import the OpenAI OpenAPI spec into Gravitee so it can be fronted as a managed AI API.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-apis-apiid-deploy
      path: /management/v2/environments/{envId}/apis/{apiId}/_deploy
      operations:
      - name: deployapi
        method: POST
        description: Deploy the OpenAI-backed Gravitee API once AI gateway policies are attached.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-analytics-measures
      path: /management/v2/environments/{envId}/analytics/measures
      operations:
      - name: querymeasures
        method: POST
        description: Query Gravitee analytics to report per-team OpenAI token spend.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: openai
    baseUri: https://api.openai.com
    description: OpenAI REST API operations consumed by this integration.
    resources:
    - name: v1-chat-completions
      path: /v1/chat/completions
      operations:
      - name: chatcompletions
        method: POST
        description: 'OpenAI REST API: chatCompletions'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: 'OpenAI REST API: listModels'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  exposes:
  - type: mcp
    namespace: gravitee-openai-mcp
    description: MCP adapter for the gravitee-openai integration.
    tools:
    - name: gravitee_openai
      description: Execute the gravitee openai integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-openai-rest
    port: 8080
    description: REST adapter for the gravitee-openai integration.
    resources:
    - path: /gravitee-openai
      name: gravitee-openai
      description: REST surface for the gravitee-openai integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-openai integration.
        call: gravitee_openai
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
