naftiko: 1.0.0-alpha2
info:
  label: Stream Gravitee gateway analytics into Datadog
  description: Forward Gravitee APIM v4 analytics (request counts, latency, error rates) into Datadog as custom metrics for unified API observability dashboards.
  tags:
  - Gravitee
  - Integration
  - Observability
  - datadog
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    DATADOG_API_KEY: DATADOG_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-analytics-measures
      path: /management/v2/environments/{envId}/analytics/measures
      operations:
      - name: querymeasures
        method: POST
        description: Query Gravitee APIM aggregate analytics measures to forward as Datadog metrics.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-analytics-time-series
      path: /management/v2/environments/{envId}/analytics/time-series
      operations:
      - name: querytimeseries
        method: POST
        description: Pull time-series analytics from Gravitee APIM for Datadog series submission.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-apis
      path: /management/v2/environments/{envId}/apis
      operations:
      - name: listapis
        method: GET
        description: List Gravitee APIs to label the Datadog metric series by API ID and name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
  - type: http
    namespace: datadog
    baseUri: https://api.datadoghq.com
    description: Datadog Metrics API operations consumed by this integration.
    resources:
    - name: api-v2-series
      path: /api/v2/series
      operations:
      - name: submitmetrics
        method: POST
        description: 'Datadog Metrics API: submitMetrics'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-events
      path: /api/v1/events
      operations:
      - name: postevent
        method: POST
        description: 'Datadog Metrics API: postEvent'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-datadog-mcp
    description: MCP adapter for the gravitee-datadog integration.
    tools:
    - name: gravitee_datadog
      description: Execute the gravitee datadog integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-datadog-rest
    port: 8080
    description: REST adapter for the gravitee-datadog integration.
    resources:
    - path: /gravitee-datadog
      name: gravitee-datadog
      description: REST surface for the gravitee-datadog integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-datadog integration.
        call: gravitee_datadog
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
