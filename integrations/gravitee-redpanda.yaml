naftiko: 1.0.0-alpha2
info:
  label: Mirror Gravitee event API traffic to Redpanda topics
  description: Forward Gravitee APIM v4 event API messages to Redpanda topics as a low-latency Kafka-compatible alternative for streaming pipelines.
  tags:
  - Gravitee
  - Integration
  - Event Streaming
  - redpanda
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    REDPANDA_API_KEY: REDPANDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-apis
      path: /management/v2/environments/{envId}/apis
      operations:
      - name: listapis
        method: GET
        description: List Gravitee v4 APIs so Redpanda topic mappings can be wired to message endpoints.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
    - name: management-v2-environments-envid-analytics-measures
      path: /management/v2/environments/{envId}/analytics/measures
      operations:
      - name: querymeasures
        method: POST
        description: Pull message-throughput measures from Gravitee to size Redpanda partitions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: redpanda
    baseUri: https://api.redpanda.com
    description: Redpanda Cloud API operations consumed by this integration.
    resources:
    - name: v1alpha2-clusters-cluster-id-topics
      path: /v1alpha2/clusters/{cluster_id}/topics
      operations:
      - name: createtopic
        method: POST
        description: 'Redpanda Cloud API: createTopic'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster_id
          in: path
          type: string
          description: Path parameter cluster_id.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-produce
      path: /v1/produce
      operations:
      - name: producemessage
        method: POST
        description: 'Redpanda Cloud API: produceMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: gravitee-redpanda-mcp
    description: MCP adapter for the gravitee-redpanda integration.
    tools:
    - name: gravitee_redpanda
      description: Execute the gravitee redpanda integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-redpanda-rest
    port: 8080
    description: REST adapter for the gravitee-redpanda integration.
    resources:
    - path: /gravitee-redpanda
      name: gravitee-redpanda
      description: REST surface for the gravitee-redpanda integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-redpanda integration.
        call: gravitee_redpanda
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
