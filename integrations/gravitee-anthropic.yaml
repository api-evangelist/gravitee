naftiko: 1.0.0-alpha2
info:
  label: Front Anthropic Claude with Gravitee AI Gateway
  description: Route Anthropic Claude API calls through the Gravitee AI Gateway so messages are subject to MCP-aware policies, per-team quotas, and unified observability alongside other LLM providers.
  tags:
  - Gravitee
  - Integration
  - AI Gateway
  - anthropic
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: gravitee
    baseUri: https://api.gravitee.io
    description: Gravitee API operations consumed by this integration.
    resources:
    - name: management-v2-environments-envid-apis-import-swagger
      path: /management/v2/environments/{envId}/apis/_import/swagger
      operations:
      - name: importswaggerapi
        method: POST
        description: Import the Anthropic OpenAPI spec into Gravitee so it can be fronted as a managed AI API.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-apis-apiid-deploy
      path: /management/v2/environments/{envId}/apis/{apiId}/_deploy
      operations:
      - name: deployapi
        method: POST
        description: Deploy the Anthropic-backed Gravitee API once AI gateway policies are attached.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v2-environments-envid-analytics-time-series
      path: /management/v2/environments/{envId}/analytics/time-series
      operations:
      - name: querytimeseries
        method: POST
        description: Pull time-series analytics from Gravitee for per-team Claude usage reporting.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: envId
          in: path
          type: string
          description: Path parameter envId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  - type: http
    namespace: anthropic
    baseUri: https://api.anthropic.com
    description: Anthropic Messages API operations consumed by this integration.
    resources:
    - name: v1-messages
      path: /v1/messages
      operations:
      - name: createmessage
        method: POST
        description: 'Anthropic Messages API: createMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: 'Anthropic Messages API: listModels'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
  exposes:
  - type: mcp
    namespace: gravitee-anthropic-mcp
    description: MCP adapter for the gravitee-anthropic integration.
    tools:
    - name: gravitee_anthropic
      description: Execute the gravitee anthropic integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: gravitee-anthropic-rest
    port: 8080
    description: REST adapter for the gravitee-anthropic integration.
    resources:
    - path: /gravitee-anthropic
      name: gravitee-anthropic
      description: REST surface for the gravitee-anthropic integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the gravitee-anthropic integration.
        call: gravitee_anthropic
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
