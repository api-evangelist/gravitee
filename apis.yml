  - type: Bearer Token
- aid: gravitee:gravitee-alert-engine
  name: Gravitee Alert Engine
  description: Gravitee Alert Engine (AE) is a real-time API monitoring solution that tracks performance, availability, errors,
    quota approach, and security events across all Gravitee gateways. It evaluates conditions, fires triggers, and routes
    notifications through webhooks, email, Slack, and other channels.
  humanURL: https://documentation.gravitee.io/ae
  baseURL: https://documentation.gravitee.io/ae
