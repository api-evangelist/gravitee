  features:
  - name: LLM Proxy
    description: Multi-provider proxy for OpenAI, Anthropic, Azure OpenAI, Bedrock, Mistral, Hugging Face, and self-hosted
      models.
  - name: Prompt Token Tracking
    description: Meter input / output tokens per consumer, per model, per route.
  - name: Prompt Guard-Rails
    description: Apply allow / deny / classify rules to user prompts before they reach the model.
  - name: Retrieval-Augmented Generation
    description: RAG policy that performs vector-store lookups and injects context into prompts.
  - name: AI Vector Store Resource
    description: Pluggable vector-store resource API for embedding-based retrieval.
  - name: MCP Proxy
    description: Govern Model Context Protocol traffic with authentication, audit, and quota.
  - name: MCP Tool Server
    description: Expose existing REST and event APIs as MCP tools to AI agents.
  - name: A2A Proxy
    description: Agent-to-agent transport with identity propagation and policy enforcement.
  - name: Agent Catalog
    description: Discoverable directory of agents, tools, and MCP servers.
  - name: AI Identity and Authorization
    description: OpenFGA permission engine and AuthZen PDP for agent-aware authorization.
  - name: ML Inference Service
    description: Run text-classification and embedding models in the gateway via the inference service plugin.
  useCases:
  - name: AI Cost Governance
    description: Cap and meter LLM spend by team, by route, by tenant.
  - name: Safe AI Onramp
    description: Apply prompt guard-rails, content classification, and audit on AI workloads.
  - name: MCP-First APIs
    description: Publish enterprise APIs as MCP tools for agents and copilots.
  - name: RAG-as-a-Service
    description: Stand up retrieval-augmented endpoints powered by managed vector stores.
