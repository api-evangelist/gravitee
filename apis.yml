- aid: gravitee:gravitee-ai-agent-management
  name: Gravitee AI Agent Management
  description: Gravitee AI Agent Management brings the API management discipline to agentic AI ecosystems. It is delivered
    as an Enterprise add-on package and includes an LLM Proxy (model routing, prompt-token tracking, prompt guard-rails, RAG),
    an MCP Proxy and MCP Tool Server, an A2A Proxy for agent-to-agent flows, an Agent Catalog, and AI-aware Identity and Authorization
    (MCP resource server, OpenFGA permission engine, AuthZen PDP).
