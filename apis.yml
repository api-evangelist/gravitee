apis:
  - aid: gravitee:gravitee
    name: Gravitee
    tags:
      - API
    humanURL: https://www.gravitee.io/
    properties:
      - url: https://www.gravitee.io/
        type: Documentation
      - url: properties/gravitee-openapi.yml
        type: OpenAPI
    description: >-
      Gravitee is a universal governance layer on top of other third-party event
      brokers, such as Solace. You can auto-discover third-party event APIs,
      control API ...
  - aid: gravitee:gravitee-management-api
    name: Gravitee Management API
    tags:
      - API Management
      - Administration
      - Gateway
    humanURL: https://documentation.gravitee.io/apim/management-api-reference
    properties:
      - url: https://documentation.gravitee.io/apim/management-api-reference
        type: Documentation
      - url: https://documentation.gravitee.io/apim/configure-and-manage-the-platform/management-api
        type: GettingStarted
    description: >-
      The Gravitee Management API provides programmatic access to the Gravitee
      APIM backend, enabling administrators and developers to create APIs, deploy
      APIs to the gateway, manage applications, subscriptions, users, and access
      analytics. The Management component exposes core APIM functionality via
      RESTful endpoints across V1 and V2 subcomponents.
  - aid: gravitee:gravitee-portal-api
    name: Gravitee Portal API
    tags:
      - Developer Portal
      - API Catalog
      - Subscriptions
    humanURL: https://documentation.gravitee.io/apim/developer-portal
    properties:
      - url: https://documentation.gravitee.io/apim/developer-portal
        type: Documentation
      - url: https://www.gravitee.io/platform/api-developer-portal
        type: ProductPage
    description: >-
      The Gravitee Portal API exposes endpoints for listing and managing APIs and
      applications in the Developer Portal UI. It powers the Developer Portal
      experience and can be used as the backend API for building custom developer
      portals. Consumers can discover, explore, subscribe to APIs, view
      documentation, and access analytics around API usage.
  - aid: gravitee:gravitee-access-management-api
    name: Gravitee Access Management API
    tags:
      - Identity
      - Access Management
      - OAuth2
      - OpenID Connect
    humanURL: https://documentation.gravitee.io/am/reference/am-api-reference
    properties:
      - url: https://documentation.gravitee.io/am/reference/am-api-reference
        type: Documentation
      - url: https://documentation.gravitee.io/am
        type: GettingStarted
      - url: https://www.gravitee.io/platform/access-management
        type: ProductPage
      - url: https://github.com/gravitee-io/gravitee-access-management
        type: GitHubOrganization
    description: >-
      Gravitee Access Management (AM) is a flexible, lightweight open source
      Identity and Access Management solution. It provides a centralized
      authentication and authorization service based on OAuth2, OpenID Connect,
      and SAML 2.0 protocols. The AM Management API exposes a complete RESTful
      API for scripting administration tasks including user management,
      identity provider configuration, and authentication flows.
