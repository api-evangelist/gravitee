  name: Gravitee API Management
  description: Gravitee API Management (APIM) is the core product — an open-source, flexible, blazing-fast API gateway, management
    plane, and developer portal. It supports v2 "proxy" APIs and v4 message-oriented APIs over REST, GraphQL, WebSocket, gRPC,
    SSE, Webhooks, Kafka, MQTT, AMQP, Solace, RabbitMQ, and MCP. Lifecycle, policies, plans, applications, subscriptions,
    federation, and analytics are all managed through the Management API and consoles.
