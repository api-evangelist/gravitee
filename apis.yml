- aid: gravitee:gravitee-access-management
  name: Gravitee Access Management
  description: Gravitee Access Management (AM) is an open-source Identity and Access Management solution offering OAuth2,
    OpenID Connect (OIDC), UMA 2.0, CIBA, SCIM 2.0, and SAML 2.0. It manages security domains, applications, users, identity
    providers, MFA factors, bot detection, certificates, flows, forms, themes, and policies. AM provides an admin REST API
    (Management API) and a runtime authorization server (Gateway).
