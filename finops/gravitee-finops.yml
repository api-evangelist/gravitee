specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Gravitee
providerId: gravitee
publisherName: Gravitee.io, Inc.
serviceCategory: API Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - API Management
  - API Gateway
  - Event Streaming
description: 'FOCUS-aligned FinOps for Gravitee: flat-rate monthly subscription per platform tier
  (with included gateways, brokers, and unlimited API calls / events) plus optional add-on packages.
  Cost grows with platform tier and add-ons, not with per-call traffic.'
sources:
  - https://www.gravitee.io/pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Gravitee
  ServiceCategory: API Management
  ProviderName: Gravitee
  PublisherName: Gravitee.io, Inc.
  InvoiceIssuerName: Gravitee.io, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_subscription
    description: Monthly Gravitee platform subscription fee per tier
    unit: month
    aggregation: sum
    dimensions:
      - product
      - tier
  - name: production_gateways
    description: Production gateway count consumed per subscription
    unit: gateway
    aggregation: max
    dimensions:
      - product
      - tier
  - name: federated_brokers
    description: Third-party federated event brokers consumed (Event Management tiers)
    unit: broker
    aggregation: max
    dimensions:
      - tier
  - name: addon_packages
    description: Optional Agent Management / Enterprise Auth add-on packages
    unit: package
    aggregation: max
    dimensions:
      - addon_name
  - name: managed_apis
    description: APIs managed in the platform (operational metric — unlimited per subscription)
    unit: api
    aggregation: max
principles:
  - name: Visibility
    description: Use Gravitee's Analytics / Monitoring views and the Management API to track gateway
      utilization, API call volume, and consumer growth even though calls are not directly billed.
  - name: Allocation
    description: Map Gravitee environments / organizations to consuming business units; allocate the
      flat subscription fee proportionally based on managed-API count or gateway-traffic share.
  - name: Optimization
    description: Right-size the subscription tier (Planet vs Galaxy vs Universe) to gateway and
      broker need; consolidate dev / test environments into a single non-prod tier; defer
      Agent / Enterprise Auth add-ons until adoption justifies them.
  - name: Accountability
    description: Designate a platform owner for the Gravitee contract and review tier-fit annually
      against actual gateway / broker usage and feature consumption.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
