naftiko: "1.0.0-alpha2"

info:
  title: Gravitee API Publish
  description: >-
    Publishes Naftiko-built REST exposes as Gravitee API definitions
    (v2 proxy or v4 message-oriented) via the APIM Management API or the
    Kubernetes ApiDefinition / ApiV4Definition CRDs. Closes the loop
    between "Naftiko shipped a REST or event-driven expose" and
    "Gravitee gateway is now routing + governing traffic to it."
  tags:
    - Naftiko
    - Gravitee
    - Partnership
    - APIM
    - Publish
    - Lifecycle
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: gravitee-env
    description: Gravitee APIM Management endpoint + token.
    keys:
      GRAVITEE_APIM_BASE: GRAVITEE_APIM_BASE
      GRAVITEE_APIM_TOKEN: GRAVITEE_APIM_TOKEN

capability:
  consumes:
    - namespace: gravitee
      type: http
      baseUri: '{{GRAVITEE_APIM_BASE}}'
      authentication:
        type: bearer
        token: '{{GRAVITEE_APIM_TOKEN}}'
      resources:
        - name: create-api
          path: '/management/v2/environments/{{env_id}}/apis'
          operations:
            - name: create-api
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
        - name: api
          path: '/management/v2/environments/{{env_id}}/apis/{{api_id}}'
          operations:
            - name: update-api
              method: PUT
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
            - name: delete-api
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
        - name: import-openapi
          path: '/management/v2/environments/{{env_id}}/apis/_import/swagger'
          operations:
            - name: import-openapi
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
        - name: api-products
          path: '/management/v2/environments/{{env_id}}/api-products'
          operations:
            - name: list-api-products
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
            - name: create-api-product
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: gravitee-api-publish-rest
      description: REST surface for publishing Naftiko-built capabilities into Gravitee APIM.
      resources:
        - name: create-api
          path: '/environments/{env_id}/apis'
          operations:
            - name: create-api
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.create-api
        - name: api
          path: '/environments/{env_id}/apis/{api_id}'
          operations:
            - name: update-api
              method: PUT
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.update-api
            - name: delete-api
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.delete-api
        - name: import-openapi
          path: '/environments/{env_id}/apis/import/openapi'
          operations:
            - name: import-openapi
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.import-openapi
        - name: api-products
          path: '/environments/{env_id}/api-products'
          operations:
            - name: list-api-products
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.list-api-products
            - name: create-api-product
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.create-api-product

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: gravitee-api-publish-mcp
      description: MCP server for publishing Naftiko-built APIs into Gravitee from agents.
      tools:
        - name: create-api
          description: Create a new Gravitee API definition (typically a Naftiko-built REST or v4 message expose).
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.create-api
        - name: update-api
          description: Update a Gravitee API definition.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.update-api
        - name: delete-api
          description: Delete a Gravitee API definition.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.delete-api
        - name: import-openapi
          description: Import an OpenAPI spec (e.g., generated by a Naftiko expose) as a new Gravitee API.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.import-openapi
        - name: list-api-products
          description: List Gravitee API Products (productized API surfaces).
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.list-api-products
        - name: create-api-product
          description: Create a new Gravitee API Product.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.create-api-product
