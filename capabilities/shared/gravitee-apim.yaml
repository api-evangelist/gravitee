naftiko: 1.0.0-alpha2
info:
  label: Gravitee APIM Management API
  description: >-
    Shared per-API capability definition for the Gravitee APIM Management API
    v2. Covers APIs, plans, applications, subscriptions, API products,
    analytics, logs, plugins, environments, and installation.
  tags:
    - Gravitee
    - API Management
    - APIM
    - Administration
  created: '2026-05-15'
  modified: '2026-05-15'
binds:
  - namespace: env
    keys:
      GRAVITEE_APIM_URL: GRAVITEE_APIM_URL
      GRAVITEE_APIM_TOKEN: GRAVITEE_APIM_TOKEN
capability:
  consumes:
    - type: http
      namespace: gravitee-apim
      baseUri: '{GRAVITEE_APIM_URL}/management/v2'
      description: Gravitee APIM Management API v2.
      authentication:
        type: bearer
        value: '{{GRAVITEE_APIM_TOKEN}}'
        placement: header
      resources:
        - name: apis
          path: /environments/{envId}/apis
          description: APIs in an environment.
          operations:
            - name: list-apis
              method: GET
              description: List APIs in an environment.
            - name: create-api
              method: POST
              description: Create an API.
            - name: get-api
              method: GET
              path: /environments/{envId}/apis/{apiId}
              description: Get an API by identifier.
            - name: update-api
              method: PUT
              path: /environments/{envId}/apis/{apiId}
              description: Update an API.
            - name: delete-api
              method: DELETE
              path: /environments/{envId}/apis/{apiId}
              description: Delete an API.
            - name: deploy-api
              method: POST
              path: /environments/{envId}/apis/{apiId}/_deploy
              description: Deploy an API to the gateway.
            - name: start-api
              method: POST
              path: /environments/{envId}/apis/{apiId}/_start
              description: Start an API.
            - name: stop-api
              method: POST
              path: /environments/{envId}/apis/{apiId}/_stop
              description: Stop an API.
            - name: import-swagger
              method: POST
              path: /environments/{envId}/apis/_import/swagger
              description: Import an API from an OpenAPI / Swagger document.
        - name: plans
          path: /environments/{envId}/apis/{apiId}/plans
          description: Plans on an API.
          operations:
            - name: list-plans
              method: GET
              description: List plans on an API.
            - name: create-plan
              method: POST
              description: Create a plan on an API.
            - name: publish-plan
              method: POST
              path: /environments/{envId}/apis/{apiId}/plans/{planId}/_publish
              description: Publish a plan.
            - name: close-plan
              method: POST
              path: /environments/{envId}/apis/{apiId}/plans/{planId}/_close
              description: Close a plan.
        - name: applications
          path: /environments/{envId}/applications
          description: Consumer applications.
          operations:
            - name: list-applications
              method: GET
              description: List applications.
            - name: create-application
              method: POST
              description: Create an application.
            - name: get-application
              method: GET
              path: /environments/{envId}/applications/{applicationId}
              description: Get an application.
        - name: subscriptions
          path: /environments/{envId}/subscriptions
          description: Subscriptions between applications and plans.
          operations:
            - name: list-subscriptions
              method: GET
              description: List subscriptions.
            - name: create-subscription
              method: POST
              description: Create a subscription.
            - name: accept-subscription
              method: POST
              path: /environments/{envId}/subscriptions/{subscriptionId}/_accept
              description: Accept a subscription.
            - name: reject-subscription
              method: POST
              path: /environments/{envId}/subscriptions/{subscriptionId}/_reject
              description: Reject a subscription.
        - name: api-products
          path: /environments/{envId}/api-products
          description: API products that bundle one or more APIs.
          operations:
            - name: list-api-products
              method: GET
              description: List API products.
            - name: create-api-product
              method: POST
              description: Create an API product.
        - name: analytics
          path: /environments/{envId}/analytics
          description: Analytics measures, facets, time-series, and dashboards.
          operations:
            - name: query-measures
              method: POST
              path: /environments/{envId}/analytics/measures
              description: Query analytics measures.
            - name: query-time-series
              method: POST
              path: /environments/{envId}/analytics/time-series
              description: Query analytics time series.
            - name: list-dashboards
              method: GET
              path: /environments/{envId}/analytics/dashboards
              description: List analytics dashboards.
        - name: logs
          path: /environments/{envId}/logs
          description: Request and error logs.
          operations:
            - name: search-logs
              method: POST
              path: /environments/{envId}/logs/search
              description: Search request logs.
        - name: plugins
          path: /plugins
          description: Installed gateway plugins.
          operations:
            - name: list-policies
              method: GET
              path: /plugins/policies
              description: List policy plugins.
            - name: list-endpoints
              method: GET
              path: /plugins/endpoints
              description: List endpoint plugins.
            - name: list-entrypoints
              method: GET
              path: /plugins/entrypoints
              description: List entrypoint plugins.
            - name: list-resources
              method: GET
              path: /plugins/resources
              description: List resource plugins.
