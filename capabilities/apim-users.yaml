naftiko: 1.0.0-alpha2
info:
  label: Gravitee.io APIM Management API — Users
  description: 'Gravitee.io APIM Management API — Users. 2 operations. Lead operation: List APIs for a User. Self-contained
    Naftiko capability covering one Gravitee business surface.'
  tags:
  - Gravitee
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apim-users
    baseUri: https://{host}/management/v2
    description: Gravitee.io APIM Management API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users-userId-apis
      path: /users/{userId}/apis
      operations:
      - name: listuserapis
        method: GET
        description: List APIs for a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    - name: users-userId-applications
      path: /users/{userId}/applications
      operations:
      - name: listuserapplications
        method: GET
        description: List Applications for a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GRAVITEE_API_KEY}}'
  exposes:
  - type: rest
    namespace: apim-users-rest
    port: 8080
    description: REST adapter for Gravitee.io APIM Management API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/{userid}/apis
      name: users-userid-apis
      description: REST surface for users-userId-apis.
      operations:
      - method: GET
        name: listuserapis
        description: List APIs for a User
        call: apim-users.listuserapis
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}/applications
      name: users-userid-applications
      description: REST surface for users-userId-applications.
      operations:
      - method: GET
        name: listuserapplications
        description: List Applications for a User
        call: apim-users.listuserapplications
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apim-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gravitee.io APIM Management API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-apis-user
      description: List APIs for a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim-users.listuserapis
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-applications-user
      description: List Applications for a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim-users.listuserapplications
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
