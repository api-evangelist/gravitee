naftiko: 1.0.0-alpha2
info:
  label: Gravitee.io APIM Management API — Logs
  description: 'Gravitee.io APIM Management API — Logs. 2 operations. Lead operation: List Error Keys for Logs. Self-contained
    Naftiko capability covering one Gravitee business surface.'
  tags:
  - Gravitee
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAVITEE_API_KEY: GRAVITEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apim-logs
    baseUri: https://{host}/management/v2
    description: Gravitee.io APIM Management API — Logs business capability. Self-contained, no shared references.
    resources:
    - name: environments-envId-logs-error-keys
      path: /environments/{envId}/logs/error-keys
      operations:
      - name: listerrorkeys
        method: GET
        description: List Error Keys for Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: environments-envId-logs-search
      path: /environments/{envId}/logs/search
      operations:
      - name: searchlogs
        method: POST
        description: Search Request Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GRAVITEE_API_KEY}}'
  exposes:
  - type: rest
    namespace: apim-logs-rest
    port: 8080
    description: REST adapter for Gravitee.io APIM Management API — Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/environments/{envid}/logs/error-keys
      name: environments-envid-logs-error-keys
      description: REST surface for environments-envId-logs-error-keys.
      operations:
      - method: GET
        name: listerrorkeys
        description: List Error Keys for Logs
        call: apim-logs.listerrorkeys
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/environments/{envid}/logs/search
      name: environments-envid-logs-search
      description: REST surface for environments-envId-logs-search.
      operations:
      - method: POST
        name: searchlogs
        description: Search Request Logs
        call: apim-logs.searchlogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apim-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gravitee.io APIM Management API — Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-error-keys-logs
      description: List Error Keys for Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim-logs.listerrorkeys
      outputParameters:
      - type: object
        mapping: $.
    - name: search-request-logs
      description: Search Request Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: apim-logs.searchlogs
      outputParameters:
      - type: object
        mapping: $.
