naftiko: "1.0.0-alpha2"

info:
  title: Gravitee Shared Policy Groups
  description: >-
    Authors and manages Gravitee SharedPolicyGroups (reusable policy
    bundles attachable to many APIs — JWT, rate-limit, transforms,
    AI guard-rails, RAG, etc.) from Naftiko spec. Lets a Naftiko
    capability declare a reusable policy bundle once and apply it
    consistently across every Gravitee API the customer ships.
  tags:
    - Naftiko
    - Gravitee
    - Partnership
    - Policy
    - Shared-Policy-Group
    - Governance
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: gravitee-env
    description: Gravitee APIM Management endpoint + token.
    keys:
      GRAVITEE_APIM_BASE: GRAVITEE_APIM_BASE
      GRAVITEE_APIM_TOKEN: GRAVITEE_APIM_TOKEN

capability:
  consumes:
    - namespace: gravitee
      type: http
      baseUri: '{{GRAVITEE_APIM_BASE}}'
      authentication:
        type: bearer
        token: '{{GRAVITEE_APIM_TOKEN}}'
      resources:
        - name: list-shared-policy-groups
          path: '/management/v2/environments/{{env_id}}/shared-policy-groups'
          operations:
            - name: list-shared-policy-groups
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
            - name: create-shared-policy-group
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
        - name: shared-policy-group
          path: '/management/v2/environments/{{env_id}}/shared-policy-groups/{{group_id}}'
          operations:
            - name: get-shared-policy-group
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: group_id, in: path, required: true }
            - name: update-shared-policy-group
              method: PUT
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: group_id, in: path, required: true }
            - name: delete-shared-policy-group
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: group_id, in: path, required: true }
        - name: deploy-shared-policy-group
          path: '/management/v2/environments/{{env_id}}/shared-policy-groups/{{group_id}}/_deploy'
          operations:
            - name: deploy-shared-policy-group
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: group_id, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: gravitee-shared-policy-groups-rest
      description: REST surface for managing Gravitee SharedPolicyGroups from Naftiko spec.
      resources:
        - name: shared-policy-groups
          path: '/environments/{env_id}/shared-policy-groups'
          operations:
            - name: list-shared-policy-groups
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.list-shared-policy-groups
            - name: create-shared-policy-group
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.create-shared-policy-group
        - name: shared-policy-group
          path: '/environments/{env_id}/shared-policy-groups/{group_id}'
          operations:
            - name: get-shared-policy-group
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: group_id, in: path, type: string, required: true }
              call: gravitee.get-shared-policy-group
            - name: update-shared-policy-group
              method: PUT
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: group_id, in: path, type: string, required: true }
              call: gravitee.update-shared-policy-group
            - name: delete-shared-policy-group
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: group_id, in: path, type: string, required: true }
              call: gravitee.delete-shared-policy-group
        - name: deploy-shared-policy-group
          path: '/environments/{env_id}/shared-policy-groups/{group_id}/deploy'
          operations:
            - name: deploy-shared-policy-group
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: group_id, in: path, type: string, required: true }
              call: gravitee.deploy-shared-policy-group

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: gravitee-shared-policy-groups-mcp
      description: MCP server for managing Gravitee SharedPolicyGroups from Naftiko spec.
      tools:
        - name: list-shared-policy-groups
          description: List Gravitee SharedPolicyGroups in an environment.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.list-shared-policy-groups
        - name: create-shared-policy-group
          description: Create a new Gravitee SharedPolicyGroup from Naftiko-declared policy intent.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.create-shared-policy-group
        - name: get-shared-policy-group
          description: Get a single Gravitee SharedPolicyGroup with its policy chain.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: group_id, type: string, required: true }
          call: gravitee.get-shared-policy-group
        - name: update-shared-policy-group
          description: Update a Gravitee SharedPolicyGroup's policy chain.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: group_id, type: string, required: true }
          call: gravitee.update-shared-policy-group
        - name: delete-shared-policy-group
          description: Delete a Gravitee SharedPolicyGroup.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: group_id, type: string, required: true }
          call: gravitee.delete-shared-policy-group
        - name: deploy-shared-policy-group
          description: Deploy a Gravitee SharedPolicyGroup to all APIs that reference it.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: group_id, type: string, required: true }
          call: gravitee.deploy-shared-policy-group
