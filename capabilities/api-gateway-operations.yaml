naftiko: 1.0.0-alpha2
info:
  label: Gravitee API Gateway Operations
  description: >-
    Workflow capability for API platform engineers operating the Gravitee
    Gateway day-to-day: API CRUD, plan publishing, application onboarding,
    and subscription approval against the APIM Management API v2.
  tags:
    - Gravitee
    - API Gateway
    - Operations
    - APIM
  created: '2026-05-15'
  modified: '2026-05-15'
binds:
  - namespace: env
    keys:
      GRAVITEE_APIM_URL: GRAVITEE_APIM_URL
      GRAVITEE_APIM_TOKEN: GRAVITEE_APIM_TOKEN
imports:
  - source: shared/gravitee-apim.yaml
capability:
  consumes:
    - type: http
      namespace: gravitee-apim
      baseUri: '{GRAVITEE_APIM_URL}/management/v2'
      authentication:
        type: bearer
        value: '{{GRAVITEE_APIM_TOKEN}}'
      tools:
        - list-apis
        - create-api
        - get-api
        - update-api
        - deploy-api
        - start-api
        - stop-api
        - import-swagger
        - list-plans
        - create-plan
        - publish-plan
        - close-plan
        - list-applications
        - create-application
        - list-subscriptions
        - create-subscription
        - accept-subscription
        - reject-subscription
        - list-policies
        - list-endpoints
