naftiko: "1.0.0-alpha2"

info:
  title: Gravitee Subscriptions Management
  description: >-
    Manages Gravitee API subscriptions, applications, and plans
    (the consumer-side of Gravitee APIM — who is subscribed to which
    API, under which plan, with which API key / OAuth client) from
    Naftiko spec. Lets a Naftiko capability provision and revoke
    subscriber access alongside the API definitions it ships.
  tags:
    - Naftiko
    - Gravitee
    - Partnership
    - Subscriptions
    - Plans
    - Applications
  created: '2026-05-15'
  modified: '2026-05-15'

binds:
  - namespace: gravitee-env
    description: Gravitee APIM Management endpoint + token.
    keys:
      GRAVITEE_APIM_BASE: GRAVITEE_APIM_BASE
      GRAVITEE_APIM_TOKEN: GRAVITEE_APIM_TOKEN

capability:
  consumes:
    - namespace: gravitee
      type: http
      baseUri: '{{GRAVITEE_APIM_BASE}}'
      authentication:
        type: bearer
        token: '{{GRAVITEE_APIM_TOKEN}}'
      resources:
        - name: applications
          path: '/management/v2/environments/{{env_id}}/applications'
          operations:
            - name: list-applications
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
            - name: create-application
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
        - name: application
          path: '/management/v2/environments/{{env_id}}/applications/{{app_id}}'
          operations:
            - name: get-application
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: app_id, in: path, required: true }
            - name: delete-application
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: app_id, in: path, required: true }
        - name: api-plans
          path: '/management/v2/environments/{{env_id}}/apis/{{api_id}}/plans'
          operations:
            - name: list-plans
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
            - name: create-plan
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
        - name: subscriptions
          path: '/management/v2/environments/{{env_id}}/apis/{{api_id}}/subscriptions'
          operations:
            - name: list-subscriptions
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
            - name: create-subscription
              method: POST
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
        - name: subscription
          path: '/management/v2/environments/{{env_id}}/apis/{{api_id}}/subscriptions/{{sub_id}}'
          operations:
            - name: get-subscription
              method: GET
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
                - { name: sub_id, in: path, required: true }
            - name: revoke-subscription
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, required: true }
                - { name: api_id, in: path, required: true }
                - { name: sub_id, in: path, required: true }

  exposes:
    - type: rest
      address: 0.0.0.0
      port: 8080
      namespace: gravitee-subscriptions-management-rest
      description: REST surface for managing Gravitee applications, plans, and subscriptions from Naftiko spec.
      resources:
        - name: applications
          path: '/environments/{env_id}/applications'
          operations:
            - name: list-applications
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.list-applications
            - name: create-application
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
              call: gravitee.create-application
        - name: application
          path: '/environments/{env_id}/applications/{app_id}'
          operations:
            - name: get-application
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: app_id, in: path, type: string, required: true }
              call: gravitee.get-application
            - name: delete-application
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: app_id, in: path, type: string, required: true }
              call: gravitee.delete-application
        - name: api-plans
          path: '/environments/{env_id}/apis/{api_id}/plans'
          operations:
            - name: list-plans
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.list-plans
            - name: create-plan
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.create-plan
        - name: subscriptions
          path: '/environments/{env_id}/apis/{api_id}/subscriptions'
          operations:
            - name: list-subscriptions
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.list-subscriptions
            - name: create-subscription
              method: POST
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
              call: gravitee.create-subscription
        - name: subscription
          path: '/environments/{env_id}/apis/{api_id}/subscriptions/{sub_id}'
          operations:
            - name: get-subscription
              method: GET
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
                - { name: sub_id, in: path, type: string, required: true }
              call: gravitee.get-subscription
            - name: revoke-subscription
              method: DELETE
              inputParameters:
                - { name: env_id, in: path, type: string, required: true }
                - { name: api_id, in: path, type: string, required: true }
                - { name: sub_id, in: path, type: string, required: true }
              call: gravitee.revoke-subscription

    - type: mcp
      address: 0.0.0.0
      port: 3010
      namespace: gravitee-subscriptions-management-mcp
      description: MCP server for managing Gravitee subscriptions, applications, and plans from agents.
      tools:
        - name: list-applications
          description: List Gravitee consumer applications in an environment.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.list-applications
        - name: create-application
          description: Register a new Gravitee consumer application.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
          call: gravitee.create-application
        - name: get-application
          description: Get a single Gravitee consumer application.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: app_id, type: string, required: true }
          call: gravitee.get-application
        - name: delete-application
          description: Delete a Gravitee consumer application.
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: app_id, type: string, required: true }
          call: gravitee.delete-application
        - name: list-plans
          description: List Gravitee API plans (free, OAuth, API key, etc.) for an API.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.list-plans
        - name: create-plan
          description: Create a new Gravitee API plan.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.create-plan
        - name: list-subscriptions
          description: List subscriptions to a Gravitee API.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.list-subscriptions
        - name: create-subscription
          description: Subscribe a Gravitee application to an API plan.
          hints: { destructiveHint: false }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
          call: gravitee.create-subscription
        - name: get-subscription
          description: Get a single Gravitee API subscription.
          hints: { readOnly: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
            - { name: sub_id, type: string, required: true }
          call: gravitee.get-subscription
        - name: revoke-subscription
          description: Revoke a Gravitee API subscription (kills the consumer's access).
          hints: { destructiveHint: true }
          inputParameters:
            - { name: env_id, type: string, required: true }
            - { name: api_id, type: string, required: true }
            - { name: sub_id, type: string, required: true }
          call: gravitee.revoke-subscription
